<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      width: 300px;
      padding: 20px;
      font-family: Arial, sans-serif;
    }
    h2 {
      margin: 0 0 15px 0;
      color: #667eea;
    }
    input {
      width: 100%;
      padding: 10px;
      margin-bottom: 10px;
      border: 1px solid #ddd;
      border-radius: 4px;
      box-sizing: border-box;
    }
    button {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-weight: bold;
    }
    button:hover {
      opacity: 0.9;
    }
    .status {
      margin-top: 15px;
      padding: 10px;
      border-radius: 4px;
      text-align: center;
    }
    .status.success {
      background: #d4edda;
      color: #155724;
    }
    .status.error {
      background: #f8d7da;
      color: #721c24;
    }
    .logged-in {
      display: none;
    }
    .logged-in.active {
      display: block;
    }
    .login-form.hidden {
      display: none;
    }
  </style>
</head>
<body>
  <h2>🔓 Funjibly</h2>

  <div class="login-form" id="loginForm">
    <input type="email" id="email" placeholder="Email" />
    <input type="password" id="password" placeholder="Password" />
    <button id="loginBtn">Login</button>
  </div>

  <div class="logged-in" id="loggedIn">
    <p>✅ Logged in!</p>
    <p id="userEmail"></p>
    <button id="logoutBtn">Logout</button>
  </div>

  <div class="status" id="status" style="display: none;"></div>

  <script src="popup.js"></script>
</body>
</html>
