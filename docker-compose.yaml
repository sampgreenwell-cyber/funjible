version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: newsaccess-api
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - PORT=3000
      - REDIS_URL=redis://redis:6379
    env_file:
      - .env
    depends_on:
      - mongodb
      - redis
    volumes:
      - ./src:/app/src
      - ./logs:/app/logs
    networks:
      - newsaccess-network

  mongodb:
    image: mongo:7.0
    container_name: newsaccess-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_DATABASE=newsaccess
      - MONGO_INITDB_ROOT_USERNAME=admin
      - MONGO_INITDB_ROOT_PASSWORD=admin123
    volumes:
      - mongodb-data:/data/db
      - ./mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js
    networks:
      - newsaccess-network

  redis:
    image: redis:7-alpine
    container_name: newsaccess-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    networks:
      - newsaccess-network

  nginx:
    image: nginx:alpine
    container_name: newsaccess-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/ssl:/etc/nginx/ssl
    depends_on:
      - api
    networks:
      - newsaccess-network
    profiles:
      - production

volumes:
  mongodb-data:
  redis-data:

networks:
  newsaccess-network:
    driver: bridge